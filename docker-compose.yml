## Day 23 Track 2 — Full observability stack
## 7 services. Anchors deck §10 demo + lab tracks 01-05.
## All ports bound to localhost only — no public exposure.

services:
  app:
    build:
      context: ./01-instrument-fastapi/app
      dockerfile: Dockerfile
    container_name: day23-app
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: inference-api
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=lab,service.namespace=aicb
      LOG_LEVEL: INFO
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [obs]

  prometheus:
    # v2.55 = the deck-sanctioned pre-v3 migration waypoint (deck §4: "upgrade to
    # v2.55 before v3; rollback only to v2.55"). To try Prometheus 3.x native
    # histograms (GA v3.8) bump to prom/prometheus:v3.12.0 (rules below are 3.x-compatible).
    image: prom/prometheus:v2.55.0
    container_name: day23-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./02-prometheus-grafana/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./02-prometheus-grafana/prometheus/rules:/etc/prometheus/rules:ro
      - prom-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
      - --enable-feature=exemplar-storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [obs]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: day23-alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./02-prometheus-grafana/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/REPLACE/ME}
    networks: [obs]

  grafana:
    image: grafana/grafana:11.3.0
    container_name: day23-grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PW:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./02-prometheus-grafana/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./02-prometheus-grafana/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks: [obs]

  loki:
    image: grafana/loki:3.3.0
    container_name: day23-loki
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./03-tracing-and-logs/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks: [obs]

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: day23-jaeger
    ports:
      - "127.0.0.1:16686:16686"  # UI
      - "127.0.0.1:14250:14250"  # gRPC OTLP-compatible
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks: [obs]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: day23-otel-collector
    ports:
      - "127.0.0.1:4317:4317"  # OTLP gRPC
      - "127.0.0.1:4318:4318"  # OTLP HTTP
      - "127.0.0.1:8888:8888"  # collector self-metrics
    volumes:
      - ./03-tracing-and-logs/otel-collector/otel-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      - jaeger
    networks: [obs]

  cross-day-stub:
    image: python:3.12-slim
    container_name: day23-cross-day-stub
    working_dir: /app
    command: ["python", "cross_day_stub_exporter.py"]
    volumes:
      - ./05-integration/cross_day_stub_exporter.py:/app/cross_day_stub_exporter.py:ro
    networks: [obs]

volumes:
  prom-data:
  grafana-data:

networks:
  obs:
    driver: bridge
